<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PRG Scanner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700&display=swap');

    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #dde1e8;
      --accent: #0a7c4e;
      --accent-light: #e8f7f1;
      --danger: #c0392b;
      --warning: #e67e22;
      --warning-light: #fef3e8;
      --text: #1a1d27;
      --muted: #7a8090;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── MODALS ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 22px;
      width: 100%; max-width: 340px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
      text-align: center;
    }
    .modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--accent); }
    .modal p  { font-size: 15px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
    .modal .dup-info {
      background: var(--warning-light);
      border: 1px solid #f0c890;
      border-radius: 9px;
      padding: 10px 12px;
      margin-bottom: 16px;
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }
    .modal input {
      width: 100%; padding: 13px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 600;
      border: 2px solid var(--border); border-radius: 9px;
      color: var(--text); background: var(--bg);
      margin-bottom: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btn {
      display: block; width: 100%;
      padding: 13px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px; font-weight: 700; letter-spacing: 1px;
      border: none; border-radius: 9px; cursor: pointer;
      background: var(--accent); color: #fff;
      margin-bottom: 9px; transition: opacity 0.15s;
    }
    .modal-btn:active { opacity: 0.8; }
    .modal-btn.secondary { background: var(--bg); color: var(--muted); border: 1px solid var(--border); font-weight: 600; }
    .modal-btn.danger    { background: var(--danger); }
    .modal-btn.warn      { background: var(--warning); }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow);
      z-index: 10;
    }
    header h1 { font-size: 19px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); }
    #user-badge {
      display: flex; align-items: center; gap: 5px;
      background: var(--accent-light); border-radius: 20px;
      padding: 5px 11px; font-size: 13px; font-weight: 700; color: var(--accent);
      cursor: pointer; user-select: none;
    }

    /* ── CAMERA ── */
    #cam-section { flex-shrink: 0; background: #000; position: relative; }
    #cam-wrap { position: relative; width: 100%; aspect-ratio: 4/3; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }

    #aim {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 55%; height: 40%;
      border: 2px solid rgba(10,124,78,0.6);
      border-radius: 6px; pointer-events: none;
    }
    #aim::before, #aim::after, #aim .c2, #aim .c3 {
      content: ''; position: absolute;
      width: 18px; height: 18px;
      border-color: var(--accent); border-style: solid;
    }
    #aim::before { top:-2px; left:-2px;    border-width: 3px 0 0 3px; }
    #aim::after  { top:-2px; right:-2px;   border-width: 3px 3px 0 0; }
    #aim .c2     { bottom:-2px; left:-2px;  border-width: 0 0 3px 3px; }
    #aim .c3     { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; }

    #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.05s; }

    #cam-status {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #fff;
      padding: 5px 10px; text-align: center;
    }

    #loc-pill {
      position: absolute; top: 8px; left: 8px;
      background: rgba(230,126,34,0.92);
      color: #fff; font-size: 12px; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      display: none; letter-spacing: 0.5px;
    }

    /* ── TABLE AREA ── */
    #table-area { flex: 1; overflow-y: auto; background: var(--bg); -webkit-overflow-scrolling: touch; }

    #status-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 7px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--accent); min-height: 30px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--surface); position: sticky; top: 0; z-index: 5; }
    th {
      padding: 8px 7px;
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; letter-spacing: 1px; color: var(--muted);
      text-transform: uppercase;
      border-bottom: 2px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); background: var(--surface); transition: background 0.4s; }
    tbody tr:nth-child(even) { background: #fafbfc; }
    tbody tr.highlight { background: var(--accent-light) !important; }
    tbody tr.warn-highlight { background: var(--warning-light) !important; }

    td { padding: 7px 7px; vertical-align: middle; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    td.ean-cell { color: var(--text); word-break: break-all; max-width: 110px; }
    td.loc-cell { color: var(--warning); font-weight: 700; }
    td.qty-cell { color: var(--accent); font-weight: 700; text-align: center; }
    td.acts-cell { text-align: right; white-space: nowrap; }

    .qty-btn {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); width: 26px; height: 26px;
      border-radius: 5px; font-size: 16px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 2px;
    }
    .qty-btn.minus { color: var(--danger); border-color: #f0c0bb; }

    #empty-state {
      text-align: center; padding: 30px 20px;
      color: var(--muted); font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
    }
    #scan-btn {
      display: block; width: 100%;
      padding: 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 700; letter-spacing: 2px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(10,124,78,0.22);
      transition: transform 0.08s, box-shadow 0.08s;
      margin-bottom: 8px;
    }
    #scan-btn:active { transform: scale(0.97); box-shadow: 0 2px 6px rgba(10,124,78,0.15); }
    #scan-btn:disabled { background: #c8cdd8; color: #fff; box-shadow: none; cursor: not-allowed; }
    #scan-btn.loc-mode { background: var(--warning); box-shadow: 0 4px 16px rgba(230,126,34,0.25); }

    .ctrl-row { display: flex; gap: 7px; }
    .ctrl-btn {
      flex: 1; padding: 9px 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
      border: 1px solid var(--border); border-radius: 7px;
      background: var(--bg); color: var(--text); cursor: pointer;
    }
    .ctrl-btn.start { border-color: #a0d4bc; color: var(--accent); }
    .ctrl-btn.stop  { border-color: #f0c0bb; color: var(--danger); }
    .ctrl-btn.exp   { border-color: #c8d4a0; color: #4a6a00; }
    .ctrl-btn.rst   { border-color: #f0d8b0; color: var(--warning); }
  </style>
</head>
<body>

<!-- ── MODAL: Jméno ── -->
<div class="modal-backdrop" id="modal-name">
  <div class="modal">
    <h2>👋 Vítej!</h2>
    <p>Zadej své jméno před začátkem skenování.</p>
    <input id="name-input" type="text" placeholder="Tvoje jméno" maxlength="30" autocomplete="off">
    <button class="modal-btn" onclick="submitName()">Pokračovat →</button>
  </div>
</div>

<!-- ── MODAL: Lokace? ── -->
<div class="modal-backdrop" id="modal-loc-choice" style="display:none">
  <div class="modal">
    <h2>📍 Režim skenování</h2>
    <p>Chceš evidovat také lokace ve skladu?<br>Pořadí: EAN → Lokace → EAN → Lokace…</p>
    <button class="modal-btn" onclick="startWithLoc(true)">✅ Ano – EAN + Lokace</button>
    <button class="modal-btn secondary" onclick="startWithLoc(false)">➡️ Ne – pouze EAN</button>
  </div>
</div>

<!-- ── MODAL: Duplikát ── -->
<div class="modal-backdrop" id="modal-dup" style="display:none">
  <div class="modal">
    <h2>⚠️ Položka již existuje</h2>
    <p id="dup-desc"></p>
    <div class="dup-info" id="dup-info"></div>
    <button class="modal-btn" onclick="resolveDup('add')">➕ Přičíst +1 kus</button>
    <button class="modal-btn warn" onclick="resolveDup('new')">📋 Přidat jako nový řádek</button>
    <button class="modal-btn secondary" onclick="resolveDup('cancel')">✖ Zrušit</button>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <h1>📦 PRG Scanner</h1>
  <div id="user-badge" onclick="changeUser()">
    <span>👤</span><span id="user-display">–</span>
  </div>
</header>

<!-- ── CAMERA ── -->
<div id="cam-section">
  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div id="aim"><span class="c2"></span><span class="c3"></span></div>
    <div id="flash"></div>
    <div id="cam-status">Kamera vypnuta</div>
    <div id="loc-pill">📍 SKENUJ LOKACI</div>
  </div>
</div>

<!-- ── TABLE AREA ── -->
<div id="table-area">
  <div id="status-bar">Čekám na spuštění…</div>
  <div id="empty-state">Žádná naskenovaná data</div>
  <table id="main-table" style="display:none">
    <thead><tr id="table-head-row"></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- ── BOTTOM BAR ── -->
<div id="bottom-bar">
  <button id="scan-btn" disabled onclick="triggerScan()">📷 SKENOVAT</button>
  <div class="ctrl-row">
    <button class="ctrl-btn start" onclick="startCam()">▶ Start</button>
    <button class="ctrl-btn stop"  onclick="stopCam()">⏹ Stop</button>
    <button class="ctrl-btn exp"   onclick="exportCSV()">📥 CSV</button>
    <button class="ctrl-btn rst"   onclick="resetData()">♻ Reset</button>
  </div>
</div>

<script>
// ── Audio ──────────────────────────────────────────────────
let audioCtx = null;
function beep(freq = 1480, dur = 0.12) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.18, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function beepWarn() { beep(600, 0.18); }

// ── State ──────────────────────────────────────────────────
let currentUser = '';
let useLocation = false;
let expectingLoc = false;   // true = next scan is a location
let pendingEAN = null;       // EAN waiting for its location
let stream = null;
let detector = null;
let cameraReady = false;

// rows: { ean, loc, qty, user, timestamps[] }
let rows = [];

// Duplicate resolution promise
let dupResolve = null;

const video     = document.getElementById('video');
const scanBtn   = document.getElementById('scan-btn');
const camSt     = document.getElementById('cam-status');
const locPill   = document.getElementById('loc-pill');
const statusBar = document.getElementById('status-bar');

function setStatus(m) { statusBar.textContent = m; }
function setCamSt(m)  { camSt.textContent = m; }

// ── Name modal ─────────────────────────────────────────────
function submitName() {
  const v = document.getElementById('name-input').value.trim();
  if (!v) { document.getElementById('name-input').focus(); return; }
  currentUser = v;
  document.getElementById('user-display').textContent = v;
  document.getElementById('modal-name').style.display = 'none';
}
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});
function changeUser() {
  const n = prompt('Změnit jméno:', currentUser);
  if (n && n.trim()) {
    currentUser = n.trim();
    document.getElementById('user-display').textContent = currentUser;
  }
}

// ── Camera start ───────────────────────────────────────────
async function startCam() {
  if (!currentUser) { alert('Nejdřív zadej jméno!'); return; }
  document.getElementById('modal-loc-choice').style.display = 'flex';
}

async function startWithLoc(withLoc) {
  useLocation = withLoc;
  expectingLoc = false;
  pendingEAN = null;
  document.getElementById('modal-loc-choice').style.display = 'none';
  renderTableHead();
  updateScanBtn();

  if (!('BarcodeDetector' in window)) {
    setStatus('❌ BarcodeDetector není podporován – použij Chrome/Edge');
    return;
  }
  try {
    const supported = await BarcodeDetector.getSupportedFormats();
    detector = new BarcodeDetector({ formats: supported });
  } catch(e) {
    detector = new BarcodeDetector({ formats: [
      'qr_code','ean_13','ean_8','code_128','code_39',
      'upc_a','upc_e','data_matrix','pdf417','itf','aztec'
    ]});
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 3840 },
        height: { ideal: 2160 },
        focusMode: { ideal: 'continuous' },
        advanced: [{ focusMode: 'continuous' }]
      }
    });
    video.srcObject = stream;
    await video.play();

    // Apply continuous autofocus via track constraints
    const track = stream.getVideoTracks()[0];
    try {
      await track.applyConstraints({
        advanced: [{ focusMode: 'continuous', pointsOfInterest: [{ x: 0.5, y: 0.5 }] }]
      });
    } catch(e) {}

    cameraReady = true;
    scanBtn.disabled = false;
    setCamSt('📷 Kamera připravena');
    setStatus('✅ Kamera spuštěna' + (useLocation ? ' · Režim: EAN + Lokace' : ' · Režim: pouze EAN'));
  } catch(err) {
    setStatus('❌ Kamera: ' + err.message);
  }
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  cameraReady = false; detector = null;
  expectingLoc = false; pendingEAN = null;
  scanBtn.disabled = true;
  locPill.style.display = 'none';
  setCamSt('Kamera vypnuta');
  setStatus('⏹ Zastaveno');
  updateScanBtn();
}

// ── Scan trigger ───────────────────────────────────────────
async function triggerScan() {
  if (!detector || !cameraReady) return;
  setCamSt('🔍 Detekuji…');
  try {
    const barcodes = await detector.detect(video);
    if (!barcodes.length) {
      setCamSt('⚠️ Nic nenalezeno – zkus znovu');
      setStatus('⚠️ Žádný kód – namiř lépe a zkus znovu');
      return;
    }
    const code = barcodes[0].rawValue;
    flashScreen();
    beep();
    await handleCode(code);
    setCamSt('📷 Kamera připravena');
  } catch(e) {
    setStatus('❌ Chyba: ' + e.message);
  }
}

// ── Code handling ──────────────────────────────────────────
async function handleCode(code) {
  if (!useLocation) {
    // Simple mode – check duplicate across all rows
    await processEAN(code, null);
    return;
  }

  if (!expectingLoc) {
    // Store EAN, now ask for location
    pendingEAN = code;
    expectingLoc = true;
    locPill.style.display = 'block';
    updateScanBtn();
    setStatus('✅ EAN: ' + code + ' · Nyní naskenuj LOKACI');
  } else {
    // This scan is the location
    const ean = pendingEAN;
    const loc = code;
    pendingEAN = null;
    expectingLoc = false;
    locPill.style.display = 'none';
    updateScanBtn();
    await processEAN(ean, loc);
  }
}

async function processEAN(ean, loc) {
  // Find ALL existing rows with this EAN (regardless of location)
  const existing = rows.filter(r => r.ean === ean);

  if (existing.length > 0) {
    beepWarn();
    // Build info string
    let info = 'EAN: ' + ean + '\n\nNalezeno na:\n';
    existing.forEach(r => {
      info += '• ' + (r.loc ? 'Lokace: ' + r.loc : 'bez lokace') + ' → ' + r.qty + ' ks\n';
    });
    if (loc) info += '\nNová lokace: ' + loc;

    const action = await showDupModal(ean, loc, info);
    if (action === 'cancel') {
      setStatus('✖ Skenování zrušeno');
      return;
    }
    if (action === 'add') {
      // Add to the most relevant existing row:
      // prefer same location, otherwise first found
      const sameLocRow = existing.find(r => r.loc === loc);
      const target = sameLocRow || existing[0];
      const idx = rows.indexOf(target);
      rows[idx].qty++;
      rows[idx].timestamps.push(nowStr());
      setStatus('➕ ' + ean + (loc ? ' / ' + loc : '') + ' → ' + rows[idx].qty + ' ks');
      renderTable(idx);
      return;
    }
    // action === 'new' → fall through to add new row
  }

  // Add new row
  rows.push({ ean, loc: loc || '', qty: 1, user: currentUser, timestamps: [nowStr()] });
  const newIdx = rows.length - 1;
  setStatus('✅ ' + ean + (loc ? ' / ' + loc : '') + ' · 1 ks  [' + currentUser + ']');
  renderTable(newIdx);
}

// ── Duplicate modal ────────────────────────────────────────
function showDupModal(ean, loc, infoText) {
  return new Promise(resolve => {
    dupResolve = resolve;
    document.getElementById('dup-desc').textContent =
      'EAN "' + ean + '" byl v této session již naskenován' + (loc ? ' (nová lokace: ' + loc + ')' : '') + '.';
    document.getElementById('dup-info').textContent = infoText;
    document.getElementById('modal-dup').style.display = 'flex';
  });
}
function resolveDup(action) {
  document.getElementById('modal-dup').style.display = 'none';
  if (dupResolve) { dupResolve(action); dupResolve = null; }
}

// ── Qty edit ───────────────────────────────────────────────
function changeQty(idx, delta) {
  rows[idx].qty += delta;
  if (delta > 0) rows[idx].timestamps.push(nowStr());
  if (rows[idx].qty <= 0) {
    rows.splice(idx, 1);
    setStatus('🗑 Řádek odstraněn');
  } else {
    setStatus('✏️ ' + rows[idx].ean + ' → ' + rows[idx].qty + ' ks');
  }
  renderTable();
}

// ── Render ─────────────────────────────────────────────────
function renderTableHead() {
  const tr = document.getElementById('table-head-row');
  tr.innerHTML = useLocation
    ? '<th>EAN</th><th>Lokace</th><th style="text-align:center">Ks</th><th style="text-align:right">±</th>'
    : '<th>EAN</th><th style="text-align:center">Ks</th><th style="text-align:right">±</th>';
}

function renderTable(highlightIdx) {
  const empty = document.getElementById('empty-state');
  const table = document.getElementById('main-table');
  const tbody = document.getElementById('tableBody');

  if (!rows.length) {
    empty.style.display = 'block';
    table.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i === highlightIdx) {
      tr.className = 'highlight';
      setTimeout(() => tr.classList.remove('highlight'), 900);
    }
    const locCell = useLocation ? `<td class="loc-cell">${r.loc || '–'}</td>` : '';
    tr.innerHTML = `
      <td class="ean-cell">${r.ean}</td>
      ${locCell}
      <td class="qty-cell">${r.qty}</td>
      <td class="acts-cell">
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        <button class="qty-btn minus" onclick="changeQty(${i},-1)">−</button>
      </td>`;
    tbody.appendChild(tr);
  });

  // Scroll to bottom so newest item is visible
  const area = document.getElementById('table-area');
  area.scrollTop = area.scrollHeight;
}

function updateScanBtn() {
  if (!cameraReady) { scanBtn.textContent = '📷 SKENOVAT'; scanBtn.className = ''; return; }
  if (expectingLoc) {
    scanBtn.textContent = '📍 SKENOVAT LOKACI';
    scanBtn.className = 'loc-mode';
  } else {
    scanBtn.textContent = '📷 SKENOVAT EAN';
    scanBtn.className = '';
  }
}

// ── Export ─────────────────────────────────────────────────
function exportCSV() {
  if (!rows.length) { setStatus('⚠️ Žádná data k exportu'); return; }
  const hasLoc = rows.some(r => r.loc);
  let csv = hasLoc ? 'EAN,Lokace,Kusy,Uzivatel,Posledni_scan\n' : 'EAN,Kusy,Uzivatel,Posledni_scan\n';
  rows.forEach(r => {
    const last = r.timestamps[r.timestamps.length - 1] || '';
    csv += hasLoc
      ? `"${r.ean}","${r.loc}",${r.qty},"${r.user}","${last}"\n`
      : `"${r.ean}",${r.qty},"${r.user}","${last}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `prg_scan_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  setStatus('📥 CSV exportováno (' + rows.length + ' řádků)');
}

function resetData() {
  if (!confirm('Smazat všechna naskenovaná data?')) return;
  rows = [];
  expectingLoc = false; pendingEAN = null;
  locPill.style.display = 'none';
  updateScanBtn();
  renderTable();
  setStatus('♻ Data smazána');
}

// ── Flash ──────────────────────────────────────────────────
function flashScreen() {
  const f = document.getElementById('flash');
  f.style.opacity = '0.45';
  setTimeout(() => { f.style.opacity = '0'; }, 120);
}

// ── Utils ──────────────────────────────────────────────────
function nowStr() {
  return new Date().toLocaleString('cs-CZ', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
}

// Init
renderTable();
</script>
</body>
</html>
