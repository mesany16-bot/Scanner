<!DOCTYPE html>
<html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vydeje – PRG WMS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#f0f2f5;--surface:#fff;--border:#e2e6ed;--accent:#0a7c4e;--accent-light:#e8f7f1;--danger:#c0392b;--danger-light:#fdecea;--warning:#e67e22;--warning-light:#fef3e8;--info:#2980b9;--info-light:#eaf4fb;--text:#1a1d27;--muted:#7a8090;--shadow:0 2px 12px rgba(0,0,0,0.07);--sidebar-w:220px;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:opacity 0.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}.btn:active{opacity:0.8;}.btn-primary{background:var(--accent);color:#fff;}.btn-secondary{background:var(--bg);color:var(--muted);border:1.5px solid var(--border);}.btn-danger{background:var(--danger);color:#fff;}.btn-warning{background:var(--warning);color:#fff;}.btn-info{background:var(--info);color:#fff;}.btn-sm{padding:6px 12px;font-size:12px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}.badge-green{background:var(--accent-light);color:var(--accent);}.badge-orange{background:var(--warning-light);color:var(--warning);}.badge-red{background:var(--danger-light);color:var(--danger);}.badge-blue{background:var(--info-light);color:var(--info);}.badge-gray{background:#f0f2f5;color:var(--muted);}
.card{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;}.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}.card-header h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:13px;}thead{background:#f8f9fb;}th{padding:9px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600;}td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}tbody tr:last-child td{border-bottom:none;}tbody tr:hover{background:#fafbfc;}.empty-row td{text-align:center;color:var(--muted);padding:28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}.form-row.single{grid-template-columns:1fr;}.form-row.triple{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}.form-group label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;background:#fff;}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}.form-group textarea{resize:vertical;min-height:70px;}
.form-section{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}.modal-box{background:var(--surface);border-radius:14px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;}.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.modal-header h3{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;}.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}.modal-body{padding:18px 22px;}.modal-footer{padding:12px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:#0a7c4e;display:flex;flex-direction:column;z-index:50;transition:transform 0.25s ease;}.sidebar-logo{padding:20px 18px 14px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:1.5px;border-bottom:1px solid rgba(255,255,255,0.15);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;}.sidebar-logo span{font-size:11px;font-weight:400;opacity:0.7;width:100%;letter-spacing:0;}#sidebar-close-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:0.8;display:none;}nav{flex:1;padding:10px 0;overflow-y:auto;}.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;color:rgba(255,255,255,0.75);cursor:pointer;font-size:14px;font-weight:500;transition:background 0.15s,color 0.15s;border-left:3px solid transparent;}.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff;}.nav-item.active{background:rgba(255,255,255,0.15);color:#fff;border-left-color:#fff;}.nav-icon{font-size:17px;width:22px;text-align:center;}.sidebar-user{padding:12px 18px;border-top:1px solid rgba(255,255,255,0.15);font-size:12px;color:rgba(255,255,255,0.7);display:flex;flex-direction:column;gap:4px;}.sidebar-user strong{color:#fff;font-size:13px;}.sidebar-user button{background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;margin-top:4px;}
#main{margin-left:var(--sidebar-w);min-height:100vh;}.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);position:sticky;top:0;z-index:40;}.topbar h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;flex:1;}.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}.hamburger-btn{display:inline-flex;align-items:center;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text);padding:4px 8px;margin-right:4px;border-radius:6px;}.content{padding:24px;max-width:1100px;}#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:49;}
.back-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:0;}.tab{padding:11px 20px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color 0.15s;}.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.items-table td input,.items-table td select{padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;width:100%;outline:none;font-family:'Inter',sans-serif;background:#fff;}.items-table td input:focus,.items-table td select:focus{border-color:var(--accent);}
.required-mark{color:var(--danger);margin-left:2px;}
#toast{position:fixed;bottom:24px;right:24px;background:#1a1d27;color:#fff;padding:12px 20px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:300px;}#toast.show{opacity:1;}
@media(min-width:901px){.hamburger-btn{display:none;}#sidebar-close-btn{display:none !important;}}
@media(max-width:900px){:root{--sidebar-w:0px;}#sidebar{transform:translateX(-220px);width:220px;}#sidebar.open{transform:translateX(0);}#sidebar-close-btn{display:block !important;}#main{margin-left:0;}.content{padding:14px;}.topbar{padding:11px 14px;}.form-row.triple{grid-template-columns:1fr 1fr;}}
</style></head><body>
<div id="auth-screen" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a7c4e,#075c3a)">
  <div style="background:#fff;border-radius:16px;padding:36px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <h1 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#0a7c4e;margin-bottom:4px">&#128230; PRG WMS</h1>
    <p style="font-size:13px;color:#7a8090;margin-bottom:20px">Warehouse Management System</p>
    <div id="auth-msg" style="font-size:13px;color:#c0392b;min-height:18px;margin-bottom:8px"></div>
    <input id="login-email" type="email" placeholder="E-mail" style="width:100%;padding:11px 14px;margin-bottom:10px;border:1.5px solid #e2e6ed;border-radius:8px;font-size:14px;outline:none">
    <input id="login-pass" type="password" placeholder="Heslo" style="width:100%;padding:11px 14px;margin-bottom:14px;border:1.5px solid #e2e6ed;border-radius:8px;font-size:14px;outline:none">
    <button onclick="doLogin()" style="width:100%;padding:12px;background:#0a7c4e;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">Prihlasit se</button>
  </div>
</div>
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sidebar-logo">PRG WMS<span>Warehouse Management</span><button onclick="toggleSidebar()" id="sidebar-close-btn">&#x2715;</button></div>
    <nav><div class="nav-item " onclick="go('wms_dashboard.html')"><span class="nav-icon">📊</span> Dashboard</div>
<div class="nav-item " onclick="go('wms_stock.html')"><span class="nav-icon">📦</span> Inventory</div>
<div class="nav-item " onclick="go('wms_warehouses.html')"><span class="nav-icon">🏭</span> Sklady</div>
<div class="nav-item " onclick="go('wms_clients.html')"><span class="nav-icon">🏢</span> Klienti</div>
<div class="nav-item " onclick="go('wms_receipts.html')"><span class="nav-icon">📥</span> Prijmy</div>
<div class="nav-item active " onclick="go('wms_deliveries.html')"><span class="nav-icon">📤</span> Vydeje</div>
<div class="nav-item " onclick="go('wms_scans.html')"><span class="nav-icon">📱</span> Skeny</div>
<div class="nav-item admin-only " onclick="go('wms_users.html')"><span class="nav-icon">👥</span> Uzivatele</div>
</nav>
    <div class="sidebar-user"><strong id="sidebar-user-name">-</strong><span id="sidebar-user-role" class="badge badge-gray"></span><button onclick="doLogout()">Odhlasit se</button></div>
  </div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div id="main">
<div class="topbar"><button class="hamburger-btn" onclick="toggleSidebar()">&#9776;</button><h2>&#128228; Vydejove doklady</h2>
<div class="topbar-actions"><a href="wms_delivery.html" class="btn btn-primary btn-sm">+ Novy doklad</a></div></div>
<div class="content">
  <div class="card">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
      <input id="search" type="text" placeholder="Hledat cislo..." oninput="filterDocs()" style="flex:1;min-width:130px;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none">
      <select id="f-status" onchange="filterDocs()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none">
        <option value="">Vsechny stavy</option>
        <option value="new">Novy</option>
        <option value="allocated">Alokovano</option>
        <option value="picking">Vyskladnovani</option>
        <option value="ready">Pripraveno</option>
        <option value="loaded">Nalozeno</option>
      </select>
      <select id="f-special" onchange="filterDocs()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none">
        <option value="">Bez filtru</option>
        <option value="preorder">Predobjednavka</option>
        <option value="hold">Hold</option>
      </select>
    </div>
    <div style="overflow-x:auto">
    <table><thead><tr><th>Cislo</th><th>Klient</th><th>Sklad</th><th>Status</th><th>Priznak</th><th>Vytvoril</th><th>Datum</th><th>Akce</th></tr></thead>
    <tbody id="tbody"><tr class="empty-row"><td colspan="8">Nacitam...</td></tr></tbody></table>
    </div>
  </div>
</div>
</div>
</div>
<div id="toast"></div>
<script src="wms_auth.js"></script>
<script>

var data=[];
function statusBadge(s){
  var m={'new':'<span class="badge badge-blue">Novy</span>','allocated':'<span class="badge badge-blue">Alokovano</span>','picking':'<span class="badge badge-orange">Vyskladnovani</span>','ready':'<span class="badge badge-green">Pripraveno</span>','loaded':'<span class="badge badge-gray">Nalozeno</span>','draft':'<span class="badge badge-gray">Koncept</span>','confirmed':'<span class="badge badge-green">Potvrzeno</span>'};
  return m[s]||'<span class="badge badge-gray">'+s+'</span>';
}
function specialBadge(s){
  if(!s)return '';
  if(s==='preorder')return '<span class="badge badge-orange">Predobjednavka</span>';
  if(s==='hold')return '<span class="badge badge-red">Hold</span>';
  return '';
}
async function afterLogin(){load();}
async function load(){
  var res=await supa.from('deliveries').select('*,warehouses(name),profiles(name),clients(name)').order('created_at',{ascending:false});
  data=res.data||[];renderDocs(data);
}
function renderDocs(d){
  var tb=document.getElementById('tbody');
  if(!d.length){tb.innerHTML='<tr class="empty-row"><td colspan="8">Zadne doklady</td></tr>';return;}
  tb.innerHTML=d.map(function(r){
    var wn=(r.warehouses&&r.warehouses.name)||'-';
    var cn=(r.clients&&r.clients.name)||'-';
    var un=(r.profiles&&r.profiles.name)||'-';
    return '<tr>'
      +'<td><a href="wms_delivery.html?id='+r.id+'" style="font-weight:700;color:var(--accent);text-decoration:none;font-family:\'JetBrains Mono\',monospace">'+r.delivery_number+'</a></td>'
      +'<td>'+cn+'</td><td>'+wn+'</td>'
      +'<td>'+statusBadge(r.status)+'</td>'
      +'<td>'+specialBadge(r.special_status)+'</td>'
      +'<td>'+un+'</td>'
      +'<td style="font-size:11px;color:var(--muted)">'+new Date(r.created_at).toLocaleDateString('cs-CZ')+'</td>'
      +'<td><div style="display:flex;gap:4px">'
        +'<a href="wms_delivery.html?id='+r.id+'" class="btn btn-secondary btn-sm">Detail</a>'
        +(r.status!=='loaded'&&r.status!=='confirmed'?'<button class="btn btn-danger btn-sm" onclick="del('+r.id+')">&#128465;</button>':'')
      +'</div></td></tr>';
  }).join('');
}
function filterDocs(){
  var q=document.getElementById('search').value.toLowerCase();
  var s=document.getElementById('f-status').value;
  var sp=document.getElementById('f-special').value;
  renderDocs(data.filter(function(r){
    return (!q||r.delivery_number.toLowerCase().includes(q))
      &&(!s||r.status===s)
      &&(!sp||r.special_status===sp);
  }));
}
async function del(id){
  if(!confirm('Smazat doklad?'))return;
  await supa.from('delivery_items').delete().eq('delivery_id',id);
  await supa.from('document_attribute_values').delete().eq('doc_type','delivery').eq('doc_id',id);
  await supa.from('deliveries').delete().eq('id',id);
  toast('Smazano');load();
}

</script></body></html>
