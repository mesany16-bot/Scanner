<!DOCTYPE html>
<html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vydejovy doklad – PRG WMS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#f0f2f5;--surface:#fff;--border:#e2e6ed;--accent:#0a7c4e;--accent-light:#e8f7f1;--danger:#c0392b;--danger-light:#fdecea;--warning:#e67e22;--warning-light:#fef3e8;--info:#2980b9;--info-light:#eaf4fb;--text:#1a1d27;--muted:#7a8090;--shadow:0 2px 12px rgba(0,0,0,0.07);--sidebar-w:220px;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:opacity 0.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}.btn:active{opacity:0.8;}.btn-primary{background:var(--accent);color:#fff;}.btn-secondary{background:var(--bg);color:var(--muted);border:1.5px solid var(--border);}.btn-danger{background:var(--danger);color:#fff;}.btn-warning{background:var(--warning);color:#fff;}.btn-sm{padding:6px 12px;font-size:12px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}.badge-green{background:var(--accent-light);color:var(--accent);}.badge-orange{background:var(--warning-light);color:var(--warning);}.badge-red{background:var(--danger-light);color:var(--danger);}.badge-blue{background:var(--info-light);color:var(--info);}.badge-gray{background:#f0f2f5;color:var(--muted);}
.card{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;}.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.card-header h3{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:13px;}thead{background:#f8f9fb;}th{padding:9px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600;}td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}tbody tr:last-child td{border-bottom:none;}tbody tr:hover{background:#fafbfc;}.empty-row td{text-align:center;color:var(--muted);padding:28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}.form-row.single{grid-template-columns:1fr;}.form-row.triple{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}.form-group label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;background:#fff;}.form-group input:focus,.form-group select:focus{border-color:var(--accent);}.form-group textarea{resize:vertical;min-height:70px;}
.form-section{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:#0a7c4e;display:flex;flex-direction:column;z-index:50;transition:transform 0.25s ease;}.sidebar-logo{padding:20px 18px 14px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:1.5px;border-bottom:1px solid rgba(255,255,255,0.15);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;}.sidebar-logo span{font-size:11px;font-weight:400;opacity:0.7;width:100%;letter-spacing:0;}#sidebar-close-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:0.8;display:none;}nav{flex:1;padding:10px 0;overflow-y:auto;}.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;color:rgba(255,255,255,0.75);cursor:pointer;font-size:14px;font-weight:500;transition:background 0.15s,color 0.15s;border-left:3px solid transparent;}.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff;}.nav-item.active{background:rgba(255,255,255,0.15);color:#fff;border-left-color:#fff;}.nav-icon{font-size:17px;width:22px;text-align:center;}.sidebar-user{padding:12px 18px;border-top:1px solid rgba(255,255,255,0.15);font-size:12px;color:rgba(255,255,255,0.7);display:flex;flex-direction:column;gap:4px;}.sidebar-user strong{color:#fff;font-size:13px;}.sidebar-user button{background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;margin-top:4px;}
#main{margin-left:var(--sidebar-w);min-height:100vh;}.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);position:sticky;top:0;z-index:40;}.topbar h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;flex:1;}.topbar-actions{display:flex;gap:8px;align-items:center;}.hamburger-btn{display:inline-flex;align-items:center;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text);padding:4px 8px;margin-right:4px;border-radius:6px;}.content{padding:24px;}#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:49;}
.back-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;}.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.items-table td input,.items-table td select{padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;width:100%;outline:none;font-family:'Inter',sans-serif;}
#toast{position:fixed;bottom:24px;right:24px;background:#1a1d27;color:#fff;padding:12px 20px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}#toast.show{opacity:1;}
@media(min-width:901px){.hamburger-btn{display:none;}#sidebar-close-btn{display:none !important;}}
@media(max-width:900px){:root{--sidebar-w:0px;}#sidebar{transform:translateX(-220px);width:220px;}#sidebar.open{transform:translateX(0);}#sidebar-close-btn{display:block !important;}#main{margin-left:0;}.content{padding:14px;}.topbar{padding:11px 14px;}}
</style></head><body>
<div id="auth-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a7c4e,#075c3a)"><div style="background:#fff;border-radius:16px;padding:36px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2)"><h1 style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#0a7c4e;margin-bottom:4px">📦 PRG WMS</h1><p style="font-size:13px;color:#7a8090;margin-bottom:20px">Warehouse Management System</p><div id="auth-msg" style="font-size:13px;color:#c0392b;min-height:18px;margin-bottom:8px"></div><input id="login-email" type="email" placeholder="E-mail" style="width:100%;padding:11px 14px;margin-bottom:10px;border:1.5px solid #e2e6ed;border-radius:8px;font-size:14px;outline:none"><input id="login-pass" type="password" placeholder="Heslo" style="width:100%;padding:11px 14px;margin-bottom:14px;border:1.5px solid #e2e6ed;border-radius:8px;font-size:14px;outline:none"><button onclick="doLogin()" style="width:100%;padding:12px;background:#0a7c4e;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">Přihlásit se</button></div></div>
<div id="app" style="display:none">
  <div id="sidebar"><div class="sidebar-logo">PRG WMS<span>Warehouse Management</span><button onclick="toggleSidebar()" id="sidebar-close-btn">&#x2715;</button></div>
  <nav><div class="nav-item " onclick="go('wms_dashboard.html')"><span class="nav-icon">📊</span> Dashboard</div>
<div class="nav-item " onclick="go('wms_stock.html')"><span class="nav-icon">📦</span> Sklad</div>
<div class="nav-item " onclick="go('wms_warehouses.html')"><span class="nav-icon">🏭</span> Sklady</div>
<div class="nav-item " onclick="go('wms_clients.html')"><span class="nav-icon">🏢</span> Klienti</div>
<div class="nav-item " onclick="go('wms_receipts.html')"><span class="nav-icon">📥</span> Příjmy</div>
<div class="nav-item active " onclick="go('wms_deliveries.html')"><span class="nav-icon">📤</span> Výdeje</div>
<div class="nav-item " onclick="go('wms_scans.html')"><span class="nav-icon">📱</span> Skeny</div>
<div class="nav-item admin-only " onclick="go('wms_users.html')"><span class="nav-icon">👥</span> Uživatelé</div>
</nav>
  <div class="sidebar-user"><strong id="sidebar-user-name">-</strong><span id="sidebar-user-role" class="badge badge-gray"></span><button onclick="doLogout()">Odhlasit se</button></div></div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div id="main">
<div class="topbar"><button class="hamburger-btn" onclick="toggleSidebar()">&#9776;</button><a href="wms_deliveries.html" class="back-btn">← Zpet</a><h2 id="page-title">&#128228; Novy vydejovy doklad</h2></div>
<div class="content" style="max-width:960px">
  <div class="card" style="margin-bottom:16px">
    <div class="card-header"><h3>Hlavicka dokladu</h3></div>
    <div style="padding:20px">
      <div class="form-row triple">
        <div class="form-group"><label>Cislo dokladu</label><input id="f-num" type="text" placeholder="Auto" readonly style="background:#f8f9fb"></div>
        <div class="form-group"><label>Klient</label><select id="f-client"><option value="">- vyberte -</option></select></div>
        <div class="form-group"><label>Sklad</label><select id="f-wh"><option value="">- vyberte -</option></select></div>
      </div>
      <div class="form-row single"><div class="form-group"><label>Poznamka</label><textarea id="f-note" style="min-height:50px"></textarea></div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h3>Polozky</h3><button class="btn btn-secondary btn-sm" id="add-row-btn" onclick="addRow()">+ Pridat polozku</button></div>
    <div style="overflow-x:auto">
      <table class="items-table">
        <thead><tr><th style="min-width:200px">SKU / Polozka</th><th>EAN</th><th>Mnozstvi</th><th>LOT</th><th>Poznamka</th><th></th></tr></thead>
        <tbody id="items-tbody"></tbody>
      </table>
    </div>
    <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span style="font-size:13px;color:var(--muted)">Celkem polozek: <strong id="row-count">0</strong></span>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="save-btns">
        <button class="btn btn-secondary" onclick="saveDraft()">&#128190; Ulozit koncept</button>
        <button class="btn btn-warning" onclick="confirmDoc()">&#128228; Potvrdit vydej</button>
      </div>
    </div>
  </div>
</div>
</div>
</div>
<div id="toast"></div>
<script>
var SUPA_URL="https://ujvqanqqhmnfxsfeqixc.supabase.co";var SUPA_KEY="sb_publishable_5o19BnZUEi8j-rU5DDAgBA_HwKB7V-v";
var supa=supabase.createClient(SUPA_URL,SUPA_KEY);
var currentUser=null,currentProfile=null;
async function doLogin(){var email=document.getElementById('login-email').value.trim();var pass=document.getElementById('login-pass').value;if(!email||!pass){document.getElementById('auth-msg').textContent='Vyplnte pole';return;}document.getElementById('auth-msg').textContent='Prihlasovani...';var res=await supa.auth.signInWithPassword({email,password:pass});if(res.error){document.getElementById('auth-msg').textContent='Chyba: '+res.error.message;return;}await onLoggedIn(res.data.user);}
async function onLoggedIn(user){currentUser=user;var prof=await supa.from('profiles').select('*').eq('id',user.id).single();currentProfile=prof.data||{name:user.email,role:'user'};document.getElementById('sidebar-user-name').textContent=currentProfile.name||user.email;var rb=document.getElementById('sidebar-user-role');rb.textContent=currentProfile.role==='admin'?'Admin':'User';rb.className=currentProfile.role==='admin'?'badge badge-orange':'badge badge-gray';document.querySelectorAll('.admin-only').forEach(function(el){el.style.display=currentProfile.role==='admin'?'flex':'none';});document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='block';if(typeof afterLogin==='function')afterLogin();}
async function doLogout(){await supa.auth.signOut();window.location.href='wms_dashboard.html';}
function go(u){window.location.href=u;}
function toggleSidebar(){var sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay'),o=sb.classList.toggle('open');ov.style.display=o?'block':'none';}
var _tt;function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('show');},2800);}
function closeModal(id){document.getElementById(id).style.display='none';}
function fmtD(dt){return new Date(dt).toLocaleDateString('cs-CZ');}
supa.auth.getSession().then(function(res){if(res.data&&res.data.session)onLoggedIn(res.data.session.user);});

var whs=[],clients=[],stockItems=[],docId=null,isConfirmed=false,rowIndex=0;
async function afterLogin(){
  var params=new URLSearchParams(window.location.search);
  docId=parseInt(params.get('id'))||null;
  var r1=await supa.from('warehouses').select('id,name').order('name');
  var r2=await supa.from('clients').select('id,name').order('name');
  var r3=await supa.from('stock_items').select('id,sku,ean,quantity').order('sku');
  whs=r1.data||[];clients=r2.data||[];stockItems=r3.data||[];
  var sw=document.getElementById('f-wh');whs.forEach(function(w){sw.innerHTML+='<option value="'+w.id+'">'+w.name+'</option>';});
  var sc=document.getElementById('f-client');clients.forEach(function(c){sc.innerHTML+='<option value="'+c.id+'">'+c.name+'</option>';});
  if(docId)loadDoc(); else{addRow();addRow();}
}
async function loadDoc(){
  var dr=await supa.from('deliveries').select('*').eq('id',docId).single();
  var ir=await supa.from('delivery_items').select('*').eq('delivery_id',docId);
  var d=dr.data;if(!d)return;
  isConfirmed=d.status==='confirmed';
  document.getElementById('page-title').textContent='Vydej '+d.delivery_number;
  document.getElementById('f-num').value=d.delivery_number;
  document.getElementById('f-client').value=d.client_id||'';
  document.getElementById('f-wh').value=d.warehouse_id||'';
  document.getElementById('f-note').value=d.note||'';
  var items=ir.data||[];items.forEach(function(i){addRow(i);});
  if(!items.length)addRow();
  if(isConfirmed){
    document.getElementById('add-row-btn').style.display='none';
    document.getElementById('save-btns').innerHTML='<span class="badge badge-orange" style="font-size:13px;padding:8px 16px">Potvrzeno</span>';
    document.querySelectorAll('.items-table input,.items-table select').forEach(function(el){el.disabled=true;});
  }
}
function addRow(item){
  var tbody=document.getElementById('items-tbody');
  var idx=rowIndex++;
  var opts=stockItems.map(function(s){return '<option value="'+s.id+'"'+(item&&item.stock_item_id===s.id?' selected':'')+'>'+s.sku+' ('+s.quantity+' ks)</option>';}).join('');
  var tr=document.createElement('tr');tr.id='row-'+idx;
  tr.innerHTML='<td><select onchange="fillEan('+idx+',this)" style="padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;width:100%"><option value="">- vyberte -</option>'+opts+'</select></td>'
    +'<td><input id="ean-'+idx+'" type="text" value="'+(item&&item.ean||'')+'" placeholder="EAN"></td>'
    +'<td><input id="qty-'+idx+'" type="number" min="1" value="'+(item?item.quantity:1)+'"></td>'
    +'<td><input id="lot-'+idx+'" type="text" value="'+(item&&item.lot||'')+'"></td>'
    +'<td><input id="note2-'+idx+'" type="text" value="'+(item&&item.note||'')+'"></td>'
    +'<td><button onclick="removeRow('+idx+')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:18px;line-height:1">&#xD7;</button></td>';
  tbody.appendChild(tr);updateCount();
}
function fillEan(idx,sel){var s=stockItems.find(function(x){return x.id===parseInt(sel.value);});if(s)document.getElementById('ean-'+idx).value=s.ean||'';}
function removeRow(idx){var r=document.getElementById('row-'+idx);if(r)r.remove();updateCount();}
function updateCount(){document.getElementById('row-count').textContent=document.getElementById('items-tbody').querySelectorAll('tr').length;}
function collectRows(){
  var rows=[];
  document.getElementById('items-tbody').querySelectorAll('tr').forEach(function(tr){
    var idx=tr.id.replace('row-','');
    var sel=tr.querySelector('select');
    var itemId=sel?parseInt(sel.value)||null:null;
    var qty=parseInt(document.getElementById('qty-'+idx).value)||0;
    if(qty>0)rows.push({stock_item_id:itemId,ean:document.getElementById('ean-'+idx).value.trim()||null,quantity:qty,lot:document.getElementById('lot-'+idx).value.trim()||null,note:document.getElementById('note2-'+idx).value.trim()||null});
  });
  return rows;
}
async function saveDraft(){
  var rows=collectRows();if(!rows.length){toast('Pridej alespon jednu polozku');return;}
  var num=docId?document.getElementById('f-num').value:'VYD-'+Date.now();
  var payload={delivery_number:num,client_id:parseInt(document.getElementById('f-client').value)||null,warehouse_id:parseInt(document.getElementById('f-wh').value)||null,note:document.getElementById('f-note').value.trim()||null,status:'draft',created_by:currentUser.id};
  var res=docId?await supa.from('deliveries').update(payload).eq('id',docId).select().single():await supa.from('deliveries').insert(payload).select().single();
  if(res.error){toast('Chyba: '+res.error.message);return;}
  docId=res.data.id;
  await supa.from('delivery_items').delete().eq('delivery_id',docId);
  await supa.from('delivery_items').insert(rows.map(function(r){return Object.assign({delivery_id:docId},r);}));
  document.getElementById('f-num').value=num;
  window.history.replaceState(null,'','wms_delivery.html?id='+docId);
  toast('Koncept ulozen');
}
async function confirmDoc(){
  await saveDraft();if(!docId)return;
  var rows=collectRows();
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.stock_item_id){
      var si=await supa.from('stock_items').select('quantity').eq('id',r.stock_item_id).single();
      var nq=Math.max(0,(si.data?si.data.quantity:0)-r.quantity);
      await supa.from('stock_items').update({quantity:nq}).eq('id',r.stock_item_id);
      await supa.from('stock_movements').insert({stock_item_id:r.stock_item_id,type:'out',quantity:r.quantity,lot:r.lot||null,note:'Vydej '+document.getElementById('f-num').value,user_id:currentUser.id});
    }
  }
  await supa.from('deliveries').update({status:'confirmed',confirmed_by:currentUser.id,confirmed_at:new Date().toISOString()}).eq('id',docId);
  toast('Vydej potvrzen - sklad aktualizovan');
  setTimeout(function(){window.location.href='wms_deliveries.html';},1500);
}

</script></body></html>
